<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Reading Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#0d1117;color:#c9d1d9;padding:24px}
.container{max-width:900px;margin:0 auto;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:18px;font-weight:600}
.stats{display:flex;gap:24px;font-size:13px;color:#8b949e}
.stat-num{color:#58a6ff;font-weight:600;font-size:16px}
.legend{display:flex;align-items:center;gap:4px;font-size:12px;color:#8b949e;margin-bottom:12px;justify-content:flex-end}
.legend-box{width:12px;height:12px;border-radius:2px}
.heatmap-outer{overflow-x:auto;padding-bottom:20px;overflow-y:hidden}
.heatmap-outer::-webkit-scrollbar{height:10px}
.heatmap-outer::-webkit-scrollbar-track{background:rgba(48,54,61,0.3);border-radius:5px}
.heatmap-outer::-webkit-scrollbar-thumb{background:#30363d;border-radius:5px}
.heatmap-outer{scrollbar-width:thin;scrollbar-color:#30363d rgba(48,54,61,0.3)}
.week-column{display:flex;flex-direction:column;gap:3px}
.day-label{width:40px;font-size:12px;color:#8b949e;display:flex;align-items:center;height:13px}
.day-cell{width:13px;height:13px;border-radius:2px;cursor:pointer;position:relative}
.week-labels{display:flex;flex-direction:column;gap:3px}
.tooltip{position:fixed;background:#1f2937;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;z-index:100;display:none;white-space:nowrap}
.loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">📚 阅读热力图</div>
    <div class="stats" id="stats">
      <div><div class="stat-num" id="st-days">…</div>阅读天数</div>
      <div><div class="stat-num" id="st-pages">…</div>总页数</div>
      <div><div class="stat-num" id="st-avg">…</div>日均页数</div>
      <div><div class="stat-num" id="st-streak">…</div>最长连续</div>
    </div>
  </div>
  <div class="legend">
    <span>少</span>
    <div class="legend-box" style="background:#ebedf0"></div>
    <div class="legend-box" style="background:#9be9a8"></div>
    <div class="legend-box" style="background:#40c463"></div>
    <div class="legend-box" style="background:#30a14e"></div>
    <div class="legend-box" style="background:#216e39"></div>
    <span>多</span>
  </div>
  <div class="heatmap-outer" id="heatmap-outer">
    <div class="loading">加载中…</div>
  </div>
</div>
<script>
async function main(){
  let raw;
  try{
    const resp = await fetch('data.json');
    raw = await resp.json();
  }catch(e){
    document.getElementById('heatmap-outer').innerHTML=
      '<div class="loading" style="color:#f85149">加载 data.json 失败，请确认文件存在</div>';
    return;
  }

  // raw: [{date, pages}, ...]
  const data = {};
  raw.forEach(r => { data[r.date] = r.pages; });

  function color(p){
    if(p==0) return '#ebedf0';
    if(p<=5) return '#9be9a8';
    if(p<=15) return '#40c463';
    if(p<=35) return '#30a14e';
    return '#216e39';
  }

  const today = new Date();
  const dates = Object.keys(data).sort();
  const [y0,m0,d0] = dates[0].split('-').map(Number);
  let start = new Date(y0, m0-1, d0);
  let end = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  // 计算 stats
  let totalDays=0, totalPages=0, streak=0, maxStreak=0, prevDate=null;
  for(const ds of dates){
    const p = data[ds];
    if(p>0){
      totalDays++;
      totalPages += p;
      const d = new Date(ds.replace(/-/g,'/'));
      if(prevDate && (d-prevDate)/86400000===1) streak++;
      else streak = 1;
      maxStreak = Math.max(maxStreak, streak);
      prevDate = d;
    }
  }
  document.getElementById('st-days').textContent = totalDays;
  document.getElementById('st-pages').textContent = totalPages;
  document.getElementById('st-avg').textContent = Math.round(totalPages/totalDays)||0;
  document.getElementById('st-streak').textContent = maxStreak;

  // 构建周网格
  const dow = (start.getDay()+6)%7; // 周一起始
  let weeks = [];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    if(d.getDay()===1 || weeks.length===0){
      // 每周从周一开始，但 grid_start 已经对齐
    }
  }

  // 简化：直接按周分组
  let allWeeks = [];
  let cur = new Date(start);
  while(cur <= end){
    let week = [];
    for(let i=0;i<7;i++){
      let d = new Date(cur); d.setDate(cur.getDate()+i);
      week.push(new Date(d));
    }
    allWeeks.push(week);
    cur.setDate(cur.getDate()+7);
  }
  // 过滤掉全 null 的周
  const startDateStr = dates[0];
  const endDateStr = dates[dates.length-1];
  weeks = allWeeks.filter(w => w.some(d => {
    const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return s >= startDateStr && s <= endDateStr;
  }));
  const nWeeks = weeks.length;

  // 月份标签
  let monthCols = [];
  let prevMo = -1;
  const moNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  weeks.forEach((w,i) => {
    for(const d of w){
      const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(s >= startDateStr && d.getMonth()+1 !== prevMo){
        monthCols.push([i, moNames[d.getMonth()+1]]);
        prevMo = d.getMonth()+1;
        break;
      }
      if(s >= startDateStr) break;
    }
  });

  let monthCells = [];
  for(let i=0;i<nWeeks;i++){
    const mc = monthCols.find(m => m[0]===i);
    if(mc) monthCells.push('<div style="grid-column:'+(i+2)+';font-size:11px;color:#8b949e;text-align:center">'+mc[1]+'</div>');
    else monthCells.push('<div style="grid-column:'+(i+2)+'"></div>');
  }
  const monthHtml = '<div style="display:grid;grid-template-columns:40px repeat('+nWeeks+',13px);gap:3px;margin-bottom:2px">'+
    '<div></div>'+monthCells.join('')+'</div>';

  // 星期标签
  const dayLabels = '<div class="week-labels">'+
    '<div class="day-label"></div><div class="day-label">Mon</div>'+
    '<div class="day-label"></div><div class="day-label">Wed</div>'+
    '<div class="day-label"></div><div class="day-label">Fri</div>'+
    '<div class="day-label"></div></div>';

  // 格子
  let cols = [];
  weeks.forEach(w => {
    let cells = [];
    w.forEach(d => {
      const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(s < startDateStr || s > endDateStr){
        cells.push('<div class="day-cell" style="background:#ebedf0;visibility:hidden"></div>');
      } else {
        const p = data[s]||0;
        const c = color(p);
        const tip = p>0 ? s+': '+p+' 页' : s+': 未阅读';
        cells.push('<div class="day-cell" style="background:'+c+'" data-tooltip="'+tip+'"></div>');
      }
    });
    cols.push('<div class="week-column">'+cells.join('')+'</div>');
  });
  const heatHtml = '<div style="display:grid;grid-template-columns:40px repeat('+nWeeks+',13px);gap:3px">'+
    dayLabels+'
  <div style="display:flex;gap:3px">'+cols.join('')+'</div></div>';

  document.getElementById('heatmap-outer').innerHTML = monthHtml + heatHtml;

  // tooltip
  document.querySelectorAll('.day-cell').forEach(function(c){
    c.addEventListener('mouseenter', function(e){
      var t=document.createElement('div');
      t.className='tooltip';
      t.textContent=e.target.dataset.tooltip;
      document.body.appendChild(t);
      t.style.display='block';
      var r=e.target.getBoundingClientRect();
      t.style.left=(r.left+r.width/2-t.offsetWidth/2)+'px';
      t.style.top=(r.top-t.offsetHeight-8)+'px';
      e.target._t=t;
    });
    c.addEventListener('mouseleave', function(e){
      if(e.target._t){e.target._t.remove();}
    });
  });
}
main();
</script>
</body>
</html>
